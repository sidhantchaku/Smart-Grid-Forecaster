services:
  - type: web
    name: smart-grid-forecasting-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /status
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: ALLOWED_ORIGINS
        value: https://smart-grid-forecasting-ui.onrender.com,http://localhost:5173,http://127.0.0.1:5173
  - type: web
    name: smart-grid-forecasting-ui
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://smart-grid-forecasting-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
